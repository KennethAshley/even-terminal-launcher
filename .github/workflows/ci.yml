name: Cross-platform CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-2025]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - run: npm ci
      - if: runner.os == 'Windows'
        run: node -e "require.resolve('@anthropic-ai/claude-agent-sdk-win32-x64/package.json')"
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
      - run: npm run license:check
      - run: npm run build
      - run: npm run package
